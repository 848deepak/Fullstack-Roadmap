name: CI Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test -- --runInBand
      - run: npm run build
      # Beginner: stop merge if tests/build fail.
      # Advanced: add security scans and deployment approvals.
