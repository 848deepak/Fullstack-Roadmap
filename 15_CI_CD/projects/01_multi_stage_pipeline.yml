name: Multi-stage Pipeline
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build step"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: echo "Test step"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Deploy step"
