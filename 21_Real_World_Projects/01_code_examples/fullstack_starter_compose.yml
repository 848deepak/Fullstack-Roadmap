version: "3.9"
services:
  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://api:8080

  api:
    image: eclipse-temurin:21-jre
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "./gradlew bootRun"
    ports:
      - "8080:8080"

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=appdb
    ports:
      - "5432:5432"
