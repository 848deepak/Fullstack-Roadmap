<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Cards Mini Project</title>
    <style>
      :root {
        --primary: #4f46e5;
        --surface: #ffffff;
        --bg: #eef2ff;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
      }

      .pricing {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1rem;
        padding: 2rem;
      }

      .plan {
        background: var(--surface);
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      }

      .plan--featured {
        border: 2px solid var(--primary);
        transform: scale(1.02);
      }

      .price {
        font-size: 1.75rem;
        font-weight: 700;
      }

      .plan button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 0.75rem;
        background: var(--primary);
        color: white;
      }

      /* Edge case: users with reduced motion should not get animated scale effects. */
      @media (prefers-reduced-motion: reduce) {
        .plan--featured {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Beginner: modifier class plan--featured demonstrates reusable component variation. -->
    <!-- Advanced: this follows BEM-like naming for large-scale CSS maintainability. -->
    <main class="pricing">
      <article class="plan">
        <h2>Starter</h2>
        <p class="price">$9</p>
        <button>Select Starter</button>
      </article>
      <article class="plan plan--featured">
        <h2>Growth</h2>
        <p class="price">$29</p>
        <button>Select Growth</button>
      </article>
      <article class="plan">
        <h2>Enterprise</h2>
        <p class="price">$99</p>
        <button>Select Enterprise</button>
      </article>
    </main>
  </body>
</html>
