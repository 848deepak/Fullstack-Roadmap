<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Product landing page mini project" />
    <title>Product Landing Mini Project</title>
  </head>
  <body>
    <header>
      <h1>TaskFlow Pro</h1>
      <p>Project planning for engineering teams.</p>
      <a href="#pricing">See pricing</a>
    </header>

    <main>
      <section aria-labelledby="feature-heading">
        <h2 id="feature-heading">Core Features</h2>
        <ul>
          <li>Kanban boards</li>
          <li>Real-time collaboration</li>
          <li>Analytics dashboard</li>
        </ul>
      </section>

      <section id="pricing" aria-labelledby="pricing-heading">
        <h2 id="pricing-heading">Pricing</h2>
        <table border="1">
          <caption>Plan Comparison</caption>
          <thead>
            <tr><th scope="col">Plan</th><th scope="col">Price</th><th scope="col">Users</th></tr>
          </thead>
          <tbody>
            <tr><th scope="row">Starter</th><td>$9</td><td>5</td></tr>
            <tr><th scope="row">Growth</th><td>$29</td><td>25</td></tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer>
      <small>All trademarks belong to their owners.</small>
    </footer>
  </body>
</html>
