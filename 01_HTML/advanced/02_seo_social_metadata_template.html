<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Beginner: title and description are required SEO basics. -->

    <title>Advanced SEO Metadata Template</title>
    <meta name="description" content="Production-ready HTML metadata with SEO and social preview tags." />
    <link rel="canonical" href="https://example.com/advanced-seo-template" />

    <meta property="og:type" content="article" />
    <meta property="og:title" content="Advanced SEO Metadata Template" />
    <meta property="og:description" content="A practical implementation of SEO + social cards." />
    <meta property="og:url" content="https://example.com/advanced-seo-template" />
    <meta property="og:image" content="https://example.com/assets/social-preview.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Advanced SEO Metadata Template" />
    <meta name="twitter:description" content="Production-ready metadata implementation." />
    <meta name="twitter:image" content="https://example.com/assets/social-preview.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "Advanced SEO Metadata Template",
        "author": { "@type": "Person", "name": "Deepak Pandey" },
        "datePublished": "2026-02-28"
      }
    </script>
  </head>
  <body>
    <main>
      <h1>SEO + Social Metadata Example</h1>
      <p>Use this head template in production pages with dynamic data per route.</p>
    </main>

</html>
