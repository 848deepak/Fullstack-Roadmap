apiVersion: v1
kind: Namespace
metadata:
  name: learning-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: learning-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/api:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: learning-app
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
